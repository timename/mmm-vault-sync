# 语言文件名称
language: ch_ZN

# MMMVaultSync 配置文件
#
# 首次安装流程：
# 1. 先启动一次服务器，让插件自动生成本配置文件
# 2. 填写下方数据库信息和 server-id
# 3. 保存后执行 /mmmvaultsync reload
# 4. 首次配置完成后，不需要重启整个服务器

# 当前子服唯一标识
# 示例：
#   survival
#   adventure
server-id: server

database:
  # MySQL 地址
  host: 127.0.0.1
  # MySQL 端口
  port: 3306
  # 数据库名
  database: minecraft
  # 用户名
  username: root
  # 密码
  # 首次安装后必须改成真实密码，不能保留为 password
  password: password
  # 连接池大小
  pool-size: 4
  # 连接超时，单位毫秒
  connect-timeout-millis: 5000
  # 同步数据表名
  table: mmm_vault_sync_balances
  # 余额变动历史表名
  # 用于全服只提示一次、离线变动汇总和最近变动查询
  change-table: mmm_vault_sync_balance_changes
  # 玩家默认货币提醒设置表名
  # 只保存玩家对 default 默认货币的提醒偏好；自管货币由服主配置控制，玩家不能关闭
  notification-table: mmm_vault_sync_notification_settings

redis:
  # 是否启用 Redis 实时同步
  # 开启后，余额写入 MySQL 后会通过 Redis 通知其他子服立即回拉最新余额
  # Redis 只负责实时通知，MySQL 仍然是权威存储；Redis 故障时会退回周期刷新
  enabled: true
  # Redis 地址；多机器部署时请填写所有子服都能访问到的 Redis 地址
  host: 127.0.0.1
  # Redis 端口
  port: 6379
  # Redis 密码；没有密码时保持空字符串
  password: ""
  # Redis 数据库编号
  database: 0
  # Redis 频道；同一组需要同步的子服必须保持一致
  channel: mmm:vaultsync:balance
  # Redis 断线后重连间隔，单位毫秒
  reconnect-delay-millis: 3000

# 默认货币 = Vault / CMI 主货币
default-currency:
  # 仅用于提示显示，不会替换 Vault 后端自身格式化规则
  display-name: 萌萌币
  symbol: ""
  # 玩家余额变化时是否发送提示
  notify-on-change: true
  # 默认货币允许玩家自己控制提醒偏好
  # 这些值是玩家首次使用提醒设置时的默认值
  player-notification:
    # 默认是否启用默认货币变动提醒
    default-enabled: true
    # 默认是否提醒默认货币增加
    default-notify-increase: true
    # 默认是否提醒默认货币减少
    default-notify-decrease: true
    # 默认最低提醒金额；小于该金额的默认货币变动不提醒
    default-min-amount: 1000
  # 是否通过 Redis 实时同步本货币
  # true: 写入后立即通知其他子服刷新，适合金币等需要实时到账的货币
  # false: 不发送 Redis 事件，只依赖进服/手动同步/周期刷新
  realtime-sync: true

# 额外自管货币
# 说明：
# 1. 这些货币完全由 MMMVaultSync 自己管理
# 2. 未来交易插件、菜单插件、任务插件应调用 MMMVaultSync API 操作这些货币
# 3. 货币 id 只能用小写英文、数字、下划线，不能与 default 冲突
currencies:
  mengmeng_shell:
    display-name: 萌萌贝壳
    symbol: "❖"
    starting-balance: 0
    # 稀有抽奖货币；领地超过 25 区块后扩建也使用该货币。
    notify-on-change: true
    notify-increase: true
    notify-decrease: true
    notify-min-amount: 0
    realtime-sync: true

  dream_meteor:
    display-name: 梦幻流星
    symbol: "✦"
    starting-balance: 0
    # 时装家具货币。
    notify-on-change: true
    notify-increase: true
    notify-decrease: true
    notify-min-amount: 0
    realtime-sync: true

  mengmeng_gem:
    display-name: 萌萌宝石
    symbol: "✧"
    starting-balance: 0
    # 赞助货币。
    notify-on-change: true
    notify-increase: true
    notify-decrease: true
    notify-min-amount: 0
    realtime-sync: true

sync:
  # 玩家进服后延迟多少 tick 再拉取一次权威余额
  join-load-delay-ticks: 10
  # 本地默认货币保底扫描间隔，单位 tick
  local-scan-interval-ticks: 20
  # 远端数据库刷新间隔，单位秒
  remote-refresh-interval-seconds: 15
  # 应用远端默认货币余额后，短时间内抑制回写，避免旧值抖动，单位毫秒
  write-suppress-millis-after-apply: 3000
  # 金额比较容差
  epsilon: 0.0001
  # 玩家退出时是否强制刷新一次余额
  flush-on-quit: true

history:
  # 余额变动历史保留天数；0 表示不按天数清理
  retention-days: 30
  # 每个玩家每种货币最多保留多少条历史；0 表示不按数量清理
  max-records-per-player-currency: 500
  # 历史清理任务间隔，单位 tick；默认 432000 tick = 6 小时
  cleanup-interval-ticks: 432000

changes:
  # /mmmvaultsync changes 每页显示多少条记录
  page-size: 8
  # 玩家最多能查询最近多少条记录；超过这个范围的旧记录仍保留在数据库，但不会通过命令翻页展示
  max-query-records: 50

logging:
  # 如需排查同步问题，可临时打开
  debug: false
